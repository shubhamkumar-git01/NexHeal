name: NexHeal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci
        npx prisma generate

    - name: Build Backend
      run: |
        cd backend
        npm run build

    - name: Install Frontend Dependencies
      run: |
        cd web
        npm ci

    - name: Build Frontend
      run: |
        cd web
        npm run build
